<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance Enquiry - Bank Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div class="navbar">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/logout}" style="float: right;">Logout</a>
        </div>

        <h1>Balance Enquiry</h1>

        <div class="card">
            <p><strong>Account Number:</strong> <span th:text="${accountNumber}"></span></p>
            <div class="balance-display">
                Your Current Balance: ₹<span th:text="${#numbers.formatDecimal(balance, 1, 2)}"></span>
            </div>
        </div>

        <div class="text-center mt-20">
            <a th:href="@{/dashboard}" class="btn btn-primary">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
