<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - Bank Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div class="navbar">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/logout}" style="float: right;">Logout</a>
        </div>

        <h1>Deposit Money</h1>

        <div th:if="${error}" class="alert alert-error">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/deposit}" th:object="${transactionRequest}" method="post">
            <div class="form-group">
                <label for="amount">Amount to Deposit:</label>
                <input type="number" id="amount" th:field="*{amount}" 
                       placeholder="Enter amount" step="0.01" min="1" required>
                <span th:if="${#fields.hasErrors('amount')}" 
                      th:errors="*{amount}" class="error"></span>
            </div>

            <div class="form-group text-center">
                <button type="submit" class="btn btn-success">Deposit</button>
                <a th:href="@{/dashboard}" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
</body>
</html>
