<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Bank Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .admin-container {
            max-width: 1200px;
        }
    </style>
</head>
<body>
    <div class="container admin-container">
        <div class="navbar">
            <a th:href="@{/admin/dashboard}">Admin Dashboard</a>
            <a th:href="@{/admin/logout}" style="float: right;">Logout</a>
        </div>

        <h1>Admin Dashboard</h1>
        <h2>Bank Management System</h2>

        <div th:if="${success}" class="alert alert-success">
            <p th:text="${success}"></p>
        </div>

        <div th:if="${error}" class="alert alert-error">
            <p th:text="${error}"></p>
        </div>

        <h2>All Accounts</h2>

        <div th:if="${accounts.isEmpty()}" class="alert alert-error">
            <p>No accounts found in the system.</p>
        </div>

        <table th:unless="${accounts.isEmpty()}">
            <thead>
                <tr>
                    <th>Account Number</th>
                    <th>Form No</th>
                    <th>Account Type</th>
                    <th>Balance</th>
                    <th>Services</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="account : ${accounts}">
                    <td th:text="${account.accountNumber}"></td>
                    <td th:text="${account.formNo}"></td>
                    <td th:text="${account.accountType}"></td>
                    <td>₹<span th:text="${#numbers.formatDecimal(account.balance != null ? account.balance : 0, 1, 2)}"></span></td>
                    <td th:text="${account.services}"></td>
                    <td>
                        <form th:action="@{/admin/delete-account}" method="post" style="display: inline;"
                              onsubmit="return confirm('Are you sure you want to delete this account?');">
                            <input type="hidden" name="accountNumber" th:value="${account.accountNumber}">
                            <button type="submit" class="btn btn-danger" style="padding: 5px 10px; font-size: 14px;">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="text-center mt-20">
            <p><strong>Total Accounts:</strong> <span th:text="${accounts.size()}"></span></p>
        </div>
    </div>
</body>
</html>
