<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Bank Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .signup-container {
            max-width: 900px;
        }
        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="container signup-container">
        <h1>Account Registration</h1>
        <h3>Create New Account</h3>

        <div th:if="${error}" class="alert alert-error">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/signup}" th:object="${signupRequest}" method="post">
            
            <!-- Personal Details Section -->
            <div class="form-section">
                <h3>Personal Details</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" th:field="*{name}" required>
                    </div>
                    <div class="form-group">
                        <label for="fatherName">Father's Name:</label>
                        <input type="text" id="fatherName" th:field="*{fatherName}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dateOfBirth">Date of Birth:</label>
                        <input type="date" id="dateOfBirth" th:field="*{dateOfBirth}" required>
                    </div>
                    <div class="form-group">
                        <label>Gender:</label>
                        <div class="radio-group">
                            <label><input type="radio" th:field="*{gender}" value="Male"> Male</label>
                            <label><input type="radio" th:field="*{gender}" value="Female"> Female</label>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" th:field="*{email}" required>
                    </div>
                    <div class="form-group">
                        <label>Marital Status:</label>
                        <div class="radio-group">
                            <label><input type="radio" th:field="*{maritalStatus}" value="Married"> Married</label>
                            <label><input type="radio" th:field="*{maritalStatus}" value="Unmarried"> Unmarried</label>
                            <label><input type="radio" th:field="*{maritalStatus}" value="Other"> Other</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Address:</label>
                    <input type="text" id="address" th:field="*{address}" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">City:</label>
                        <input type="text" id="city" th:field="*{city}" required>
                    </div>
                    <div class="form-group">
                        <label for="state">State:</label>
                        <input type="text" id="state" th:field="*{state}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="pincode">Pincode:</label>
                    <input type="text" id="pincode" th:field="*{pincode}" required>
                </div>
            </div>

            <!-- Additional Details Section -->
            <div class="form-section">
                <h3>Additional Details</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="religion">Religion:</label>
                        <select id="religion" th:field="*{religion}">
                            <option value="Hindu">Hindu</option>
                            <option value="Muslim">Muslim</option>
                            <option value="Sikh">Sikh</option>
                            <option value="Christian">Christian</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="category">Category:</label>
                        <select id="category" th:field="*{category}">
                            <option value="General">General</option>
                            <option value="OBC">OBC</option>
                            <option value="SC">SC</option>
                            <option value="ST">ST</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="income">Income:</label>
                        <select id="income" th:field="*{income}">
                            <option value="Null">Null</option>
                            <option value="<1,50,000">&lt;1,50,000</option>
                            <option value="<2,50,000">&lt;2,50,000</option>
                            <option value="<5,00,000">&lt;5,00,000</option>
                            <option value="Upto 10,00,000">Upto 10,00,000</option>
                            <option value="Above 10,00,000">Above 10,00,000</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="education">Education:</label>
                        <select id="education" th:field="*{education}">
                            <option value="Non-Graduate">Non-Graduate</option>
                            <option value="Graduate">Graduate</option>
                            <option value="Post-Graduate">Post-Graduate</option>
                            <option value="Doctorate">Doctorate</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="occupation">Occupation:</label>
                        <select id="occupation" th:field="*{occupation}">
                            <option value="Salaried">Salaried</option>
                            <option value="Self-Employed">Self-Employed</option>
                            <option value="Business">Business</option>
                            <option value="Student">Student</option>
                            <option value="Retired">Retired</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="panNumber">PAN Number:</label>
                        <input type="text" id="panNumber" th:field="*{panNumber}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="aadharNumber">Aadhar Number:</label>
                        <input type="text" id="aadharNumber" th:field="*{aadharNumber}" required>
                    </div>
                    <div class="form-group">
                        <label>Senior Citizen:</label>
                        <div class="radio-group">
                            <label><input type="radio" th:field="*{seniorCitizen}" value="Yes"> Yes</label>
                            <label><input type="radio" th:field="*{seniorCitizen}" value="No"> No</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Existing Account:</label>
                    <div class="radio-group">
                        <label><input type="radio" th:field="*{existingAccount}" value="Yes"> Yes</label>
                        <label><input type="radio" th:field="*{existingAccount}" value="No"> No</label>
                    </div>
                </div>
            </div>

            <!-- Account Details Section -->
            <div class="form-section">
                <h3>Account Details</h3>
                <div class="form-group">
                    <label>Account Type:</label>
                    <div class="radio-group">
                        <label><input type="radio" th:field="*{accountType}" value="Saving Account"> Saving Account</label>
                        <label><input type="radio" th:field="*{accountType}" value="Fixed Deposit Account"> Fixed Deposit</label>
                        <label><input type="radio" th:field="*{accountType}" value="Current Account"> Current Account</label>
                        <label><input type="radio" th:field="*{accountType}" value="Recurring Deposit Account"> Recurring Deposit</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Services Required:</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" th:field="*{atmCard}" value="on"> ATM Card</label>
                        <label><input type="checkbox" th:field="*{internetBanking}" value="on"> Internet Banking</label>
                        <label><input type="checkbox" th:field="*{mobileBanking}" value="on"> Mobile Banking</label>
                        <label><input type="checkbox" th:field="*{emailAlerts}" value="on"> Email Alerts</label>
                        <label><input type="checkbox" th:field="*{chequeBook}" value="on"> Cheque Book</label>
                        <label><input type="checkbox" th:field="*{eStatement}" value="on"> E-Statement</label>
                    </div>
                </div>
            </div>

            <div class="form-group text-center">
                <button type="submit" class="btn btn-primary">Submit</button>
                <a th:href="@{/login}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
