<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bank Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>Bank Management System</h1>
        <h2>Login</h2>

        <div th:if="${error}" class="alert alert-error">
            <p th:text="${error}"></p>
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            <p>You have been logged out successfully.</p>
        </div>

        <form th:action="@{/login}" th:object="${loginRequest}" method="post">
            <div class="form-group">
                <label for="accountNumber">Account Number:</label>
                <input type="text" id="accountNumber" th:field="*{accountNumber}" 
                       placeholder="Enter your account number" required>
                <span th:if="${#fields.hasErrors('accountNumber')}" 
                      th:errors="*{accountNumber}" class="error"></span>
            </div>

            <div class="form-group">
                <label for="pin">PIN:</label>
                <input type="password" id="pin" th:field="*{pin}" 
                       placeholder="Enter your PIN" required>
                <span th:if="${#fields.hasErrors('pin')}" 
                      th:errors="*{pin}" class="error"></span>
            </div>

            <div class="form-group text-center">
                <button type="submit" class="btn btn-primary">Sign In</button>
                <button type="button" class="btn btn-secondary" 
                        onclick="document.getElementById('accountNumber').value=''; 
                                 document.getElementById('pin').value='';">Clear</button>
            </div>
        </form>

        <div class="text-center mt-20">
            <p>Don't have an account? <a th:href="@{/signup}">Sign Up</a></p>
            <p><a th:href="@{/admin/login}">Admin Login</a></p>
        </div>
    </div>
</body>
</html>
